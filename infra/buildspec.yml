version: 0.2

phases:
  install:
    runtime-versions:
      ruby: 3.3
    commands:
      - gem install bundler --no-document
      - bundle install --jobs 4 --retry 3
  pre_build:
    commands:
      - |
        bundle exec ruby -r 'rouge' -r './lib/monokai_sublime_slate' -e "File.write('source/stylesheets/rouge.css', Rouge::Themes::MonokaiSublimeSlate.render(scope: '.highlight')); File.write('source/stylesheets/rouge_print.css', \"* { transition:none!important; }\n\" + Rouge::Themes::Base16::Solarized.render(scope: '.highlight'))"
      - rm source/stylesheets/rouge.css.erb source/stylesheets/rouge_print.css.erb
  build:
    commands:
      - bundle exec middleman build --verbose
  post_build:
    commands:
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ]; then
          aws s3 sync build/ s3://$S3_BUCKET/ --delete
        else
          echo "Build failed, skipping deploy"
          exit 1
        fi
